<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalTexOCR</title>
    <meta name="description" content="手写LaTeX识别与格式化工作台 — OCR + Code LLM + KaTeX实时渲染">
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>

<body>
    <!-- Top Bar -->
    <div class="topbar">
        <span class="topbar-brand">LocalTexOCR</span>
        <a class="topbar-github" href="https://github.com/30466/LocalTexOCR" target="_blank" rel="noopener" title="GitHub">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
        </a>
        <span class="topbar-divider"></span>
        <span class="topbar-filename" id="topFilename">No document</span>
        <button class="topbar-delete-btn" id="deleteDocBtn" title="Delete current document" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
        </button>
        <span class="topbar-spacer"></span>

        <!-- Search -->
        <span class="search-wrap" id="searchWrap" style="display:none;">
            <button class="search-toggle" id="searchToggle" title="Search (Ctrl+F)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
            <input class="search-input" id="searchInput" type="text" placeholder="Search...">
            <span class="search-info" id="searchInfo"></span>
            <button class="search-nav-btn" id="searchPrev" disabled>&#9650;</button>
            <button class="search-nav-btn" id="searchNext" disabled>&#9660;</button>
        </span>

        <!-- Status -->
        <span class="topbar-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Checking...</span>
        </span>

        <!-- Model selects -->
        <select class="model-select" id="ocrModelSelect" title="OCR Model">
            <option value="glm-ocr:latest">glm-ocr:latest</option>
        </select>
        <select class="model-select" id="codeModelSelect" title="Code Model">
            <option value="qwen2.5-coder:3b">qwen2.5-coder:3b</option>
        </select>

        <!-- Prompt select + manage -->
        <button class="topbar-btn" id="promptManageBtn">管理提示词</button>

        <button class="topbar-btn" id="newFileBtn" title="Upload new file">Upload</button>
        <button class="topbar-btn primary" id="ocrAllBtn" style="display:none;">OCR All</button>

        <!-- Format dropdown -->
        <span class="format-wrap" id="formatWrap" style="display:none;">
            <button class="topbar-btn accent" id="formatBtn">LaTeX 格式化 ▾</button>
            <div class="format-menu" id="formatMenu">
                <div class="format-item" data-action="page">格式化该页</div>
                <div class="format-item" data-action="all">格式化全部</div>
            </div>
        </span>

        <!-- Export dropdown (.tex only) -->
        <span class="export-wrap" id="exportWrap" style="display:none;">
            <button class="topbar-btn" id="exportBtn">Export ▾</button>
            <div class="export-menu" id="exportMenu">
                <div class="export-item" data-fmt="tex">.tex &nbsp; LaTeX</div>
            </div>
        </span>

        <button class="topbar-btn" id="copyAllBtn" style="display:none;">Copy All</button>
    </div>

    <!-- Progress bar -->
    <div class="ocr-progress" id="ocrProgress" style="display:none;">
        <div class="ocr-progress-bar" id="ocrProgressBar" style="width:0%"></div>
    </div>

    <!-- Main 3-Column Layout -->
    <div class="main">
        <!-- Left: Doc List + Page List -->
        <div class="panel-left hidden" id="panelLeft">
            <div class="doc-list-section" id="docListSection">
                <div class="panel-header doc-list-header" id="docListHeader">
                    <span>Documents</span>
                    <span class="doc-list-count" id="docListCount"></span>
                    <span class="panel-header-spacer"></span>
                    <button class="doc-list-toggle" id="docListToggle" title="Collapse">&#9650;</button>
                </div>
                <div class="doc-list" id="docList"></div>
            </div>
            <div class="panel-divider"></div>
            <div class="page-list-section">
                <div class="panel-header">Pages</div>
                <div class="page-list" id="pageList"></div>
            </div>
        </div>

        <!-- Center: Image Preview -->
        <div class="panel-center" id="panelCenter">
            <div class="upload-zone" id="uploadZone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>Click or drag files here</p>
                <small>Supports: PNG, JPG, GIF, BMP, PDF</small>
            </div>
            <div class="preview-container" id="previewContainer">
                <div class="preview-wrap" id="previewWrap">
                    <img id="previewImage" src="" alt="Preview">
                </div>
            </div>
        </div>

        <!-- Resize handle -->
        <div class="resize-handle hidden" id="resizeHandle"></div>

        <!-- Right: OCR + Render split panel -->
        <div class="panel-right hidden" id="panelRight">
            <!-- Result header -->
            <div class="result-header">
                <div class="result-header-row">
                    <span class="result-header-title">OCR Result</span>
                    <span class="result-header-spacer"></span>
                    <span class="result-time" id="resultTime" style="display:none;"></span>
                </div>
                <div class="result-header-row" id="resultToolbar" style="display:none;">
                    <span class="result-header-spacer"></span>
                    <button class="copy-btn" id="rescanBtn" title="Re-scan this page">Re-scan</button>
                    <button class="copy-btn" id="copyPageBtn">Copy</button>
                </div>
            </div>

            <!-- Body: split into LaTeX Code (top) + Rendered Preview (bottom) -->
            <div class="result-body" id="resultBody">
                <div class="result-placeholder">Select a page to view OCR result</div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.bmp,.pdf" multiple>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Prompt Management Modal -->
    <div class="modal-overlay" id="promptModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-titlebar">
                <span class="modal-title">提示词管理</span>
                <button class="modal-close" id="promptModalClose">&#10005;</button>
            </div>
            <div class="prompt-type-tabs" id="promptTypeTabs">
                <button class="prompt-type-tab active" data-type="ocr">OCR 提示词</button>
                <button class="prompt-type-tab" data-type="format">格式化提示词</button>
            </div>
            <div class="prompt-layout">
                <div class="prompt-list-panel">
                    <div class="prompt-list" id="promptList"></div>
                    <button class="prompt-list-new-btn" id="promptNewBtn">+ 新建</button>
                </div>
                <div class="prompt-editor-area">
                    <input class="prompt-name-input" id="promptNameInput" type="text" placeholder="提示词名称">
                    <textarea class="prompt-content-input" id="promptContentInput" placeholder="提示词内容（格式化提示词末尾用 {ocr_text} 插入原文）"></textarea>
                    <div class="prompt-actions">
                        <button class="prompt-btn" id="promptSaveBtn">保存</button>
                        <button class="prompt-btn danger" id="promptDeleteBtn">删除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
